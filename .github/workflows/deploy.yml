name: Deploy dashboard (167)

# Auto-deploy the Nuxt dashboard to the prod server (167) on every push to
# master. Runs on a self-hosted runner installed ON 167 (dials out to GitHub —
# works through the locked-down firewall). See docs/RUNNER-SETUP-167.md.

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # allow manual re-deploy from the Actions tab

# Serialize deploys: never two builds at once. cancel-in-progress:false queues
# a newer push behind the running deploy rather than killing it mid-swap.
concurrency:
  group: deploy-dashboard-167
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, gastos-167]
    steps:
      # IMPORTANT: deploy the LIVE repo, NOT the runner's ephemeral checkout.
      # pm2 `gastos-gub-dashboard` serves /root/gastos-gub-uy/app/.output. If we
      # build+swap inside the runner's _work checkout (as `actions/checkout`
      # does), the fresh .output is orphaned there and pm2 keeps serving stale
      # code — the deploy reports "healthy" while the live site never changes
      # (observed 2026-07-20). deploy-dashboard.mjs resolves REPO from its own
      # path, so running it out of /root/gastos-gub-uy makes it build+swap the
      # very dir pm2 runs. The live repo already holds app/.env (never
      # committed), so no secret materialization is needed.
      - name: Deploy the live repo
        shell: bash
        run: |
          set -euo pipefail
          cd /root/gastos-gub-uy
          git fetch origin master
          git reset --hard origin/master
          # The root lockfile is intentionally gitignored in this repository;
          # install reconciles the runner's local lock instead of failing on it.
          npm install --include=dev --no-audit --no-fund
          npm --prefix app ci
          node scripts/deploy-dashboard.mjs
          npm run ensure-indexes
          pm2 startOrRestart ecosystem.config.js --only gastos-gub-cronserver --env production
          pm2 startOrRestart ecosystem.config.js --only gastos-gub-contact-enrichment --env production
          pm2 startOrRestart ecosystem.config.js --only gastos-gub-contact-enrichment-rupe --env production
          pm2 save
          sleep 20
          node - <<'NODE'
          const { execFileSync } = require('node:child_process')
          const processes = JSON.parse(execFileSync('pm2', ['jlist'], { encoding: 'utf8' }))
          for (const name of ['gastos-gub-cronserver', 'gastos-gub-contact-enrichment', 'gastos-gub-contact-enrichment-rupe']) {
            const process = processes.find(candidate => candidate.name === name)
            if (process?.pm2_env?.status !== 'online') {
              throw new Error(`${name} is not online after deploy (status: ${process?.pm2_env?.status ?? 'missing'})`)
            }
          }
          NODE
          pm2 show gastos-gub-cronserver
          pm2 show gastos-gub-contact-enrichment
          pm2 show gastos-gub-contact-enrichment-rupe
          pm2 logs gastos-gub-contact-enrichment --lines 20 --nostream
          pm2 logs gastos-gub-contact-enrichment-rupe --lines 20 --nostream
